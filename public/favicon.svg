<svg width="100%" height="100%" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sentinelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#7000ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <linearGradient id="sentinelCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100" height="100" rx="24" fill="#06060c" />
  
  <g filter="url(#glow)">
    <!-- Outer Diamond Shield Framework -->
    <polygon points="50,10 88,32 88,68 50,90 12,68 12,32" fill="rgba(8, 9, 16, 0.9)" stroke="url(#sentinelGrad)" stroke-width="4.5" stroke-linejoin="round" />
    <polygon points="50,18 80,36 80,64 50,82 20,64 20,36" fill="none" stroke="rgba(0, 240, 255, 0.3)" stroke-width="1.8" stroke-dasharray="3 3" />

    <!-- Inner Cyber Key Emblem -->
    <path d="M50 30 C42 30 36 36 36 44 C36 50 40 55 45 57 V68 L40 73 V77 H45 V81 H55 V75 L55 57 C60 55 64 50 64 44 C64 36 58 30 50 30 Z" fill="url(#sentinelCore)" />
    
    <!-- Key Center Core -->
    <circle cx="50" cy="42" r="4.5" fill="#06060c" />
  </g>
</svg>